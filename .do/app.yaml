# DigitalOcean App Platform — app spec: app.yaml (root). Sync: cp app.yaml .do/app.yaml
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/
# CLI: doctl auth init  then  ./scripts/deploy-app-platform.sh
#      update existing:  DO_APP_ID=<id> ./scripts/deploy-app-platform.sh
#
# MONGODB_URI is injected from the managed database component below. Add JWT, Twilio, etc. in the console.
# The root Dockerfile in this monorepo is not a service here — api + web use rloco-backend / rloco-frontend.

name: rloko-app
region: blr

features:
  - buildpack-stack=ubuntu-22

databases:
  - name: rloko_mongo
    engine: MONGODB
    version: "7"
    production: true
    cluster_name: rloko-cluster

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: rloko.com
    type: PRIMARY
  - domain: www.rloko.com
    type: ALIAS

ingress:
  rules:
    - match:
        path:
          prefix: /health
      component:
        name: api
    - match:
        path:
          prefix: /ready
      component:
        name: api
    - match:
        path:
          prefix: /api
      component:
        name: api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: web

services:
  - name: api
    github:
      branch: main
      deploy_on_push: true
      repo: coderidgetech/rloco-backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 2
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /health
      initial_delay_seconds: 20
    envs:
      - key: MONGODB_URI
        value: ${rloko_mongo.DATABASE_URL}
        scope: RUN_TIME
        type: GENERAL
      - key: ENV
        value: production
        scope: RUN_TIME
        type: GENERAL
      - key: PORT
        value: "8080"
        scope: RUN_TIME
        type: GENERAL
      - key: APP_BASE_URL
        value: https://rloko.com
        scope: RUN_TIME
        type: GENERAL
      - key: CORS_ALLOWED_ORIGINS
        value: https://rloko.com,https://www.rloko.com
        scope: RUN_TIME
        type: GENERAL
      # Add in console (SECRET / RUN_TIME): JWT_SECRET, TWILIO_*, STRIPE_*, etc.

  - name: web
    github:
      branch: main
      deploy_on_push: true
      repo: coderidgetech/rloco-frontend
    dockerfile_path: Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: VITE_API_URL
        value: https://rloko.com/api
        scope: BUILD_TIME
        type: GENERAL
