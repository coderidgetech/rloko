# DigitalOcean App Platform — https://rloko.com
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# This repo’s spec is this file: app.yaml (at the repository root).
# `.do/app.yaml` is a copy of the same spec for tools that look only in `.do/`.
# After changing app.yaml, run:  cp app.yaml .do/app.yaml
#
# Deploy
#  • Create / update the app from this file (paste YAML, or set spec path: app.yaml).
#  • CLI: doctl apps create --spec app.yaml
#
# A root Dockerfile exists only so “Connect repository” can find a supported file;
# the real app is the two `services` below (rloco-backend, rloco-frontend), not that image.
#
# 1) Add secrets on the `api` component: MONGODB_URI, JWT_SECRET, Twilio, Stripe, …
# 2) DNS for rloko.com / www (App Platform domains).
# 3) Rebuild `web` when VITE_* build args change.

name: rloko
region: nyc

domains:
  - domain: rloko.com
    type: PRIMARY
  - domain: www.rloko.com
    type: ALIAS

ingress:
  rules:
    - match:
        path:
          prefix: /health
      component:
        name: api
    - match:
        path:
          prefix: /ready
      component:
        name: api
    - match:
        path:
          prefix: /api
      component:
        name: api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: web

services:
  - name: api
    github:
      branch: main
      deploy_on_push: true
      repo: coderidgetech/rloco-backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 20
    envs:
      - key: ENV
        value: production
        scope: RUN_TIME
        type: GENERAL
      - key: PORT
        value: "8080"
        scope: RUN_TIME
        type: GENERAL
      - key: APP_BASE_URL
        value: https://rloko.com
        scope: RUN_TIME
        type: GENERAL
      - key: CORS_ALLOWED_ORIGINS
        value: https://rloko.com,https://www.rloko.com
        scope: RUN_TIME
        type: GENERAL

  - name: web
    github:
      branch: main
      deploy_on_push: true
      repo: coderidgetech/rloco-frontend
    dockerfile_path: Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: VITE_API_URL
        value: https://rloko.com/api
        scope: BUILD_TIME
        type: GENERAL
      # Optional: add in the console (BUILD_TIME) and redeploy — VITE_STRIPE_PUBLISHABLE_KEY,
      # VITE_GOOGLE_CLIENT_ID, VITE_GOOGLE_MAPS_API_KEY

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
